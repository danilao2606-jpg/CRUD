<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>User.info.0=)</title>
</head>
<body>
<h2>Edit user</h2>
<form method="post" th:action="@{/user/update/{id}(id=${user.id})}">
    <input type="hidden" name="id" th:value="${user.id}"/>

    <label>Name:</label>
    <input type="text" name="name" th:value="${user.name}" required/><br/>

    <label>Email:</label>
    <input type="email" name="email" th:value="${user.email}" required/><br/>

    <label>Age:</label>
    <input type="number" name="age" th:value="${user.age}" required/><br/>

    <button type="submit">Update</button>
</form>
<a href="/user">Cancel</a>
</body>
</html>
