<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>User.info.0=)</title>
</head>
<body>

<table border="1">
    <thead>
    <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Age</th>
        <th>Delete</th>
        <th>Update</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="user : ${userList}">
        <td th:text="${user.name}"></td>
        <td th:text="${user.email}"></td>
        <td th:text="${user.age}"></td>
        <td>
            <form method="post" th:action="@{/user/delete/{id}(id=${user.id})}" style="display: inline;">
                <button type="submit">Del</button>
            </form>
        </td>
        <td>
            <a th:href="@{/user/update/{id}(id=${user.id})}">
                <button type="button">Update</button>
            </a>
        </td>
    </tr>
    </tbody>
</table>

<h2>Add New User</h2>
<form th:method="POST" th:action="@{/user/add}" th:object="${user}">
    <label for="name">Name:</label>
    <input type="text" th:field="*{name}" id="name"/>
    <div style="color:red" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Name Error</div>
    <br/>

    <label for="email">Email:</label>
    <input type="email" th:field="*{email}" id="email"/>
    <div style="color:red" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">Email Error</div>
    <br/>

    <label for="age">Age:</label>
    <input type="number" th:field="*{age}" id="age"/>
    <div style="color:red" th:if="${#fields.hasErrors('age')}" th:errors="*{age}">Age Error</div>
    <br/>


    <button type="submit">Save</button>
</form>

</body>
</html>
